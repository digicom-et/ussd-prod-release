## -*- shell-script -*- ######################################################
##                                                                          ##
##  JBoss Bootstrap Script — USSD Gateway Docker (BASE JVM layer)           ##
##  Heap sizing is applied by compute-jvm.sh (AUTO layer) at startup.       ##
##                                                                          ##
##############################################################################

if [ -z "${JBOSS_MODULES_SYSTEM_PKGS:-}" ]; then
   JBOSS_MODULES_SYSTEM_PKGS="org.jboss.byteman"
fi

# BASE JVM flags (heap supplied by compute-jvm.sh AUTO_JVM_OPTS).
# Fallback below guards against missing/broken compute-jvm.sh in container.
JAVA_OPTS=""
JAVA_OPTS="$JAVA_OPTS -Djava.net.preferIPv4Stack=true"
JAVA_OPTS="$JAVA_OPTS -Djboss.modules.system.pkgs=$JBOSS_MODULES_SYSTEM_PKGS"
JAVA_OPTS="$JAVA_OPTS -Djava.awt.headless=true"
JAVA_OPTS="$JAVA_OPTS -Duser.timezone=${TZ:-UTC}"
JAVA_OPTS="$JAVA_OPTS -Djboss.server.default.config=standalone.xml"

# jSS7 Phase 4 zero-copy integration
JAVA_OPTS="$JAVA_OPTS -Djss7.m3ua.byteBufEnabled=true"
JAVA_OPTS="$JAVA_OPTS -Djss7.sccp.byteBufEnabled=true"
JAVA_OPTS="$JAVA_OPTS -Djss7.asn.nettyEncodeEnabled=true"
JAVA_OPTS="$JAVA_OPTS -Djss7.asn.flatIndexEnabled=true"

# Netty leak detection (disabled in production profile via entrypoint)
JAVA_OPTS="$JAVA_OPTS -Dio.netty.leakDetectionLevel=simple"

# SCTP transport tuning
JAVA_OPTS="$JAVA_OPTS -Dsctp.nodelay=true"
JAVA_OPTS="$JAVA_OPTS -Dsctp.sndbuf=2097152"
JAVA_OPTS="$JAVA_OPTS -Dsctp.rcvbuf=2097152"

# RMI / SecureRandom
JAVA_OPTS="$JAVA_OPTS -Dsun.rmi.dgc.client.gcInterval=3600000"
JAVA_OPTS="$JAVA_OPTS -Dsun.rmi.dgc.server.gcInterval=3600000"
JAVA_OPTS="$JAVA_OPTS -Djava.security.egd=file:/dev/./urandom"

# Optional JMX (uncomment for remote monitoring)
# JAVA_OPTS="$JAVA_OPTS -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9999 -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.authenticate=false"

# Optional JPDA debug (or use USER_CONFIG_JVM)
# JAVA_OPTS="$JAVA_OPTS -agentlib:jdwp=transport=dt_socket,address=*:8787,server=y,suspend=n"

# -------------------------------------------------------------------
# Heap safety net — if compute-jvm.sh failed to supply AUTO_JVM_OPTS
# (e.g. missing /sys/fs/cgroup, broken entrypoint), fall back to a
# safe 4 GB heap matching the 5 GB container memory limit.
# This prevents WildFly from starting with the JVM default (~512 MB)
# and dying with OutOfMemory under load.
# -------------------------------------------------------------------
if [ -n "${AUTO_JVM_OPTS:-}" ]; then
    JAVA_OPTS="${JAVA_OPTS} ${AUTO_JVM_OPTS}"
else
    echo "[standalone.conf] WARN: AUTO_JVM_OPTS not set — falling back to -Xms2g -Xmx4g"
    JAVA_OPTS="${JAVA_OPTS} -Xms2g -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
fi
