# USSD Gateway PROD release — host network for SCTP (MAP client on :8011 → GW :8012)
services:
  init:
    image: alpine:3.19
    container_name: ussd-prod-init
    user: "0:0"
    restart: "no"
    volumes:
      - /opt/ussdgw:/opt/ussdgw
      - ./config-seed:/bundled-seed:ro
      - ./standalone.conf:/bundled/standalone.conf:ro
      - ./scripts/host-init.sh:/host-init.sh:ro
    command: ["/bin/sh", "/host-init.sh"]

  ussdgw:
    image: ${USSDGW_IMAGE:-restcomm-ussd:7.3.1-SNAPSHOT}
    container_name: ussd-prod
    hostname: ussd-prod
    depends_on:
      init:
        condition: service_completed_successfully

    network_mode: host

    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "2"

    volumes:
      - /opt/ussdgw/data:/opt/ussdgw/data
      - /opt/ussdgw/log:/opt/ussdgw/log
      - /opt/ussdgw/configuration:/opt/ussdgw/configuration
      - /opt/ussdgw/standalone.conf:/opt/ussdgw/standalone.conf:ro
      - /opt/ussdgw/patched_jar:/opt/ussdgw/patched_jar:ro
      - /opt/ussdgw/config-seed:/opt/ussdgw/config-seed:ro

    environment:
      - USSDGW_HOSTNAME=ussd-prod
      - AUTO_JVM_ENABLED=true
      - USSDGW_PROFILE=lab
      - USER_CONFIG_JVM=
      - PATCH_FORCE=true
      - PATCH_BACKUP=true
      - TZ=Asia/Ho_Chi_Minh

    stop_grace_period: 120s
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/jolokia/version || curl -fsS -u admin:admin -H 'Content-Type: application/json' -d '{\"operation\":\"read-attribute\",\"address\":[],\"name\":\"server-state\"}' http://127.0.0.1:9990/management | grep -q running"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 10
