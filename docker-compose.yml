# =============================================================================
# USSD Gateway — PROD Release — single-file Compose for the WHOLE stack.
#
# Three services, one `docker compose up -d` (and one `docker attach`) gets you:
#
#   1. ussdgw     — the USSD Gateway (WildFly 10 + jSS7) on host network so
#                  SCTP/MAP can bind 8011/8012 directly to the host IP.
#                  Image variant is chosen by USSDGW_IMAGE_VARIANT
#                  (alpine|heavy, default alpine).
#
#   2. collector  — Rust AF_PACKET/BPF SCTP/M3UA packet sniffer. Headless,
#                  exposes metrics over HTTP at :9090 on the HOST
#                  (network_mode:host). Captures every SCTP DATA chunk that
#                  crosses the GW port.
#
#   3. tui        — Rust ratatui/crossterm dashboard that polls the collector.
#                  Foreground, TTY-allocated. Auto-attaches to YOUR terminal
#                  on `docker compose up` — the dashboard appears in place
#                  and redraws without scrolling (ratatui alternate screen +
#                  dirty-cell rendering).
#
# Usage:
#   # Start gateway + collector (headless) + TUI (auto on your terminal):
#   docker compose up -d ussdgw collector
#   docker compose up tui                # foreground, auto-attach TUI
#   # ...or all-in-one (gateway + collector daemons, TUI in foreground):
#   docker compose up                     # attaches the TUI service
#
#   # Or split:
#   docker compose up -d ussdgw collector   # daemons
#   docker attach sctp-m3ua-tui             # attach to TUI whenever you want
#   # Ctrl-p Ctrl-q to detach without killing it
#
# Image variants:
#   USSDGW_IMAGE_VARIANT=alpine  (default)  → restcomm-ussd-alpine:*
#   USSDGW_IMAGE_VARIANT=heavy              → restcomm-ussd:*
# =============================================================================

name: ussdgw-prod-release

services:

# ===========================================================================
  # 1. USSD Gateway — runs on host network so SCTP binds host IP directly
  # ===========================================================================
  init:
    image: alpine:3.19
    container_name: ussd-prod-init
    user: "0:0"
    restart: "no"
    volumes:
      - /opt/ussdgw:/opt/ussdgw
      - ./gateway/config-seed:/bundled-seed:ro
      - ./gateway/standalone.conf:/bundled/standalone.conf:ro
      - ./gateway/scripts/host-init.sh:/host-init.sh:ro
    command: ["/bin/sh", "/host-init.sh"]

  ussdgw:
    image: ${USSDGW_IMAGE:-restcomm-ussd-alpine:7.3.1}
    container_name: ussd-prod
    hostname: ussd-prod
    depends_on:
      init:
        condition: service_completed_successfully

    network_mode: host

    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "2"

    volumes:
      - /opt/ussdgw/data:/opt/ussdgw/data
      - /opt/ussdgw/log:/opt/ussdgw/log
      - /opt/ussdgw/configuration:/opt/ussdgw/configuration
      - /opt/ussdgw/standalone.conf:/opt/ussdgw/standalone.conf:ro
      - /opt/ussdgw/patched_jar:/opt/ussdgw/patched_jar:ro
      - /opt/ussdgw/config-seed:/opt/ussdgw/config-seed:ro

    environment:
      - USSDGW_HOSTNAME=ussd-prod
      - AUTO_JVM_ENABLED=true
      - USSDGW_PROFILE=prod
      - USER_CONFIG_JVM=
      - PATCH_FORCE=true
      - PATCH_BACKUP=true
      - TZ=Asia/Ho_Chi_Minh

    stop_grace_period: 120s
    restart: unless-stopped

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://127.0.0.1:8080/jolokia/version
          || curl -fsS -u admin:admin
            -H 'Content-Type: application/json'
            -d '{"operation":"read-attribute","address":[],"name":"server-state"}'
            http://127.0.0.1:9990/management
            | grep -q running
      interval: 30s
# ===========================================================================
  # 2. BPF collector — AF_PACKET SCTP/M3UA metrics over HTTP at :9090 (host)
  # ===========================================================================
  collector:
    build:
      context: ./bpf-tps-monitor/collector
      dockerfile: Dockerfile
    image: sctp-m3ua-collector:latest
    container_name: sctp-m3ua-collector

    network_mode: host    # sniff host SCTP traffic + expose :9090

    cap_add:
      - NET_RAW
      - NET_ADMIN

    restart: unless-stopped

    command:
      - "--bind"
      - "0.0.0.0:9090"
      - "--iface"
      - "eth0"
      - "--gw-port"
      - "8012"
      - "--window-secs"
      - "1"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

# ===========================================================================
  # 3. TUI dashboard — ratatui/crossterm, foreground, auto-attaches to YOUR
  #    terminal on `docker compose up`. Uses crossterm alternate-screen so the
  #    dashboard renders in place without scrolling.
  #
  #    Uses network_mode: host so it can reach the collector over
  #    127.0.0.1:9090 (same netns) AND so the TTY allocation works the same
  #    way as a `docker run -it` invocation — no port mapping, no bridge
  #    DNS, no surprises.
  # ===========================================================================
  tui:
    build:
      context: ./bpf-tps-monitor/tui
      dockerfile: Dockerfile
    image: sctp-m3ua-tui:latest
    container_name: sctp-m3ua-tui

    network_mode: host    # see comment above

    stdin_open: true      # attach stdin so crossterm reads keys
    tty: true             # allocate a PTY so raw mode + alt screen work

    depends_on:
      collector:
        condition: service_healthy

    environment:
      TERM: xterm-256color
      COLORTERM: truecolor

    command:
      - "--collector"
      - "http://127.0.0.1:9090"
      - "--interval-ms"
      - "1000"
      - "--label"
      - "ussdgw-prod"

    restart: on-failure   # foreground service; if it dies, restart it