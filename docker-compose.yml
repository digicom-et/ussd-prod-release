# =============================================================================
# USSD Gateway — PROD Release — single-file Compose for the USSD Gateway.
#
# Two services:
#
#   1. init       — one-shot Alpine container that seeds /opt/ussdgw on host
#
#   2. ussdgw     — the USSD Gateway (WildFly 10 + jSS7) on host network so
#                  SCTP/MAP can bind 8011/8012 directly to the host IP.
#                  Image variant is chosen by USSDGW_IMAGE_VARIANT
#                  (zulu|heavy, default zulu).
#
# BPF collector + TUI have been moved to docker-compose.bpf.yml.
#
# Usage:
#   docker compose up -d
#
# Image variants:
#   USSDGW_IMAGE_VARIANT=zulu   (default)  → restcomm-ussd-zulu:*
#   USSDGW_IMAGE_VARIANT=heavy             → restcomm-ussd:*
# =============================================================================

name: ussdgw-prod-release

services:

# ===========================================================================
  # 1. USSD Gateway — runs on host network so SCTP binds host IP directly
  # ===========================================================================
  init:
    image: alpine:3.19
    container_name: ussd-prod-init
    user: "0:0"
    restart: "no"
    volumes:
      - /opt/ussdgw:/opt/ussdgw
      - ./gateway/config-seed:/bundled-seed:ro
      - ./gateway/standalone.conf:/bundled/standalone.conf:ro
      - ./gateway/scripts/host-init.sh:/host-init.sh:ro
    command: ["/bin/sh", "/host-init.sh"]

  ussdgw:
    image: ${USSDGW_IMAGE:-restcomm-ussd-zulu:7.3.1}
    container_name: ussd-prod
    hostname: ussd-prod
    depends_on:
      init:
        condition: service_completed_successfully

    network_mode: host

    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN         # required for SCTP raw socket bind on some kernels
    # privileged: true was removed for security — if SCTP fails, revert:
    #   privileged: true

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "2"

    volumes:
      - /opt/ussdgw/data:/opt/ussdgw/data
      - /opt/ussdgw/log:/opt/ussdgw/log
      - /opt/ussdgw/configuration:/opt/ussdgw/configuration
      - /opt/ussdgw/standalone.conf:/opt/ussdgw/standalone.conf:ro
      - /opt/ussdgw/patched_jar:/opt/ussdgw/patched_jar:ro
      - /opt/ussdgw/config-seed:/opt/ussdgw/config-seed:ro

    environment:
      - USSDGW_HOSTNAME=ussd-prod
      - AUTO_JVM_ENABLED=true
      - USSDGW_PROFILE=prod
      - USER_CONFIG_JVM=
      - PATCH_FORCE=true
      - PATCH_BACKUP=true
      - TZ=Asia/Ho_Chi_Minh

    stop_grace_period: 120s
    restart: unless-stopped

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://127.0.0.1:8080/jolokia/version
          || curl -fsS -u admin:admin
            -H 'Content-Type: application/json'
            -d '{"operation":"read-attribute","address":[],"name":"server-state"}'
            http://127.0.0.1:9990/management
            | grep -q running
      interval: 30s